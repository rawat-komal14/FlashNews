<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlashNews Aggregator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container header-top">
            <div class="logo-area">
                <div class="app-icon">FN</div>
                <h1>FlashNews</h1>
            </div>
            
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Search news...">
                <button id="search-btn">🔍</button>
            </div>

            <div class="controls">
                <button id="theme-toggle">🌓 Theme</button>
                <button id="show-bookmarks">🔖 Bookmarks</button>
                <button id="start-quiz-btn">📝 Quiz</button>
            </div>
        </div>
        <nav>
            <button class="category-btn active" data-category="general">Latest</button>
            <button class="category-btn" data-category="business">Business</button>
            <button class="category-btn" data-category="technology">Tech</button>
            <button class="category-btn" data-category="sports">Sports</button>
        </nav>
    </header>

    <main class="container">
        <h2 id="section-title">Latest Headlines</h2>
        <div id="news-grid" class="news-grid"></div>
    </main>

    <div id="quiz-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Current Affairs Quiz</h2>
            <div id="quiz-container"></div>
            <button id="submit-quiz" style="display:none; margin-top:15px;">Submit Answer</button>
            <div id="quiz-results"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
